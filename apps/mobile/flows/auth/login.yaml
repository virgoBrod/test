appId: com.inovisec.broadsecmobileapp

---
# ============================================================
# Test: Login exitoso con credenciales válidas
# Assumes permissions are already granted
# ============================================================

# Abrir la app y esperar al splash screen
- launchApp:
    clearState: true

# Esperar a que aparezca la pantalla de SIGN IN
- waitForAnimationToEnd:
    timeout: 10000

- assertVisible: "SIGN IN"

# Ingresar username
- tapOn: "Username"
- inputText: ${MOBILE_USERNAME}

# Ingresar password
- tapOn: "Password"
- inputText: ${MOBILE_PASSWORD}

# Enviar formulario con tecla Enter del teclado
- pressKey: Enter

# Esperar a que cargue la siguiente pantalla
- waitForAnimationToEnd:
    timeout: 1000

# Hacer click en botón LOGIN
- tapOn: "LOG IN"

# Esperar a que cargue la siguiente pantalla
- waitForAnimationToEnd:
    timeout: 5000

- tapOn: "Later"

# Esperar a que cargue la siguiente pantalla
- waitForAnimationToEnd:
    timeout: 5000

- tapOn: "Select Armament"

- tapOn: "Pistol"

- tapOn: "FICT-WPN-0001"

- tapOn: "Motorcycle"

- tapOn: "MTR-04A"

- scrollUntilVisible:
    element: "SAVE"
    direction: DOWN
    timeout: 30000

- tapOn:
    point: "85%,69%"

- tapOn:
    point: "85%,74%"

- tapOn:
    point: "85%,79%"

- tapOn: "Enter the additional value"

- inputText: "Teaser"

- tapOn:
    point: "87%,88%"

- scrollUntilVisible:
    element: "SAVE"
    direction: DOWN
    timeout: 30000

- tapOn: "SAVE"

# Cerrar la app al finalizar el test
- stopApp
